<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Odoo Rust MCP</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: 'Geist Sans', 'Segoe UI', sans-serif;
        background:
          radial-gradient(circle at top left, rgba(61, 115, 230, 0.16), transparent 30%),
          linear-gradient(180deg, #191920 0%, #121218 100%);
        color: #e9e9ec;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
      }

      .container {
        width: min(30rem, calc(100vw - 3rem));
        padding: 2rem;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        background: rgba(24, 24, 31, 0.84);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
        backdrop-filter: blur(14px);
        text-align: center;
      }

      h1 {
        margin: 0.25rem 0 0.75rem;
        font-size: 1.4rem;
        font-weight: 600;
      }

      p {
        margin: 0;
        color: #9a9aa2;
        font-size: 0.95rem;
        line-height: 1.6;
      }

      .loader {
        width: 40px;
        height: 40px;
        margin: 0 auto 1.5rem;
        border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.12);
        border-top-color: #6c9bff;
        animation: spin 0.8s linear infinite;
      }

      .status {
        margin-top: 0.5rem;
      }

      .error {
        display: none;
        margin-top: 1rem;
        color: #ff9b9b;
      }

      .actions {
        display: none;
        margin-top: 1.25rem;
        justify-content: center;
        gap: 0.75rem;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 0.7rem 1rem;
        background: #2b64d8;
        color: white;
        font: inherit;
        cursor: pointer;
      }

      button.secondary {
        background: rgba(255, 255, 255, 0.08);
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="loader" id="loader"></div>
      <h1>Starting Odoo Rust MCP</h1>
      <p class="status" id="status">Preparing the local configuration server.</p>
      <p class="error" id="error-msg">The desktop app could not open the local configuration UI yet.</p>
      <div class="actions" id="actions">
        <button id="open-ui" type="button">Open Config UI</button>
        <button class="secondary" id="retry" type="button">Retry</button>
      </div>
    </div>
    <script>
      const statusEl = document.getElementById('status');
      const errorEl = document.getElementById('error-msg');
      const loaderEl = document.getElementById('loader');
      const actionsEl = document.getElementById('actions');
      const openUiButton = document.getElementById('open-ui');
      const retryButton = document.getElementById('retry');
      const targetUrl = 'http://127.0.0.1:3008/?desktopVersion=0.5.1';

      function setStatus(message) {
        statusEl.textContent = message;
      }

      function showError(message) {
        if (message) {
          errorEl.textContent = message;
        }
        errorEl.style.display = 'block';
        actionsEl.style.display = 'flex';
        loaderEl.style.display = 'none';
      }

      window.__odooMcpDesktopSetStatus = setStatus;
      window.__odooMcpDesktopShowError = showError;

      openUiButton.addEventListener('click', () => {
        window.location.href = targetUrl;
      });

      retryButton.addEventListener('click', () => {
        errorEl.style.display = 'none';
        actionsEl.style.display = 'none';
        loaderEl.style.display = 'block';
        setStatus('Retrying local configuration server startup...');
        window.location.reload();
      });
    </script>
  </body>
</html>
