name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: odoo-rust-mcp
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # =============================================================================
  # Stage 1: Build React UI (dependency for all other jobs)
  # =============================================================================
  build-ui:
    name: Build React UI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: config-ui/package-lock.json

      - name: Install dependencies
        working-directory: config-ui
        run: npm ci

      - name: Build React app
        working-directory: config-ui
        run: npm run build

      - name: Upload UI build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: config-ui-dist
          path: rust-mcp/static/dist
          retention-days: 1

  build-docs:
    name: Build mdBook documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install mdBook
        run: cargo install mdbook --locked

      - name: Build documentation
        run: mdbook build docs

      - name: Upload documentation artifacts
        uses: actions/upload-artifact@v6
        with:
          name: mdbook-docs
          path: docs/book
          retention-days: 1

  # =============================================================================
  # Stage 2: Build binaries for all platforms (depends on build-ui)
  # =============================================================================
  build:
    name: Build ${{ matrix.target }}
    needs: [build-ui, build-docs]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download UI build artifacts
        uses: actions/download-artifact@v7
        with:
          name: config-ui-dist
          path: rust-mcp/static/dist

      - name: Download documentation artifacts
        uses: actions/download-artifact@v7
        with:
          name: mdbook-docs
          path: docs/book

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --manifest-path rust-mcp/Cargo.toml

      - name: Prepare release assets (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release/static
          cp rust-mcp/target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} release/
          cp -r config release/
          # Copy React UI static files
          if [ -d "rust-mcp/static/dist" ]; then
            cp -r rust-mcp/static/dist release/static/
            echo "✓ Static files copied to release/static/dist"
            ls -la release/static/dist/
          else
            echo "⚠ No static/dist folder found"
          fi
          mkdir -p release/docs
          cp -r docs/book release/docs/
          mkdir -p release/assets
          cp assets/odoo-rust-mcp.ico release/assets/
          cp README.md release/
          cp LICENSE release/ 2>/dev/null || echo "No LICENSE file"
          cp dotenv.example release/.env.example
          cp instances.example.json release/instances.json
          cp scripts/install.sh release/
          chmod +x release/install.sh
          cd release
          echo "=== Release archive contents ==="
          find . -type f | head -20
          tar -czvf ../${{ env.BINARY_NAME }}-${{ matrix.target }}.${{ matrix.archive }} .

      - name: Prepare release assets (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release/static
          Copy-Item "rust-mcp/target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe" -Destination release/
          Copy-Item -Recurse config -Destination release/
          if (Test-Path "rust-mcp/static/dist") {
            Copy-Item -Recurse "rust-mcp/static/dist" -Destination "release/static/"
            Write-Host "Static files copied to release/static/dist"
          } else {
            Write-Host "No static/dist folder found"
          }
          New-Item -ItemType Directory -Force -Path release/docs | Out-Null
          Copy-Item -Recurse docs/book -Destination release/docs/
          New-Item -ItemType Directory -Force -Path release/assets | Out-Null
          Copy-Item assets/odoo-rust-mcp.ico -Destination release/assets/
          Copy-Item README.md -Destination release/
          Copy-Item LICENSE -Destination release/ -ErrorAction SilentlyContinue
          Copy-Item dotenv.example -Destination release/.env.example
          Copy-Item instances.example.json -Destination release/instances.json
          Copy-Item scripts/install.ps1 -Destination release/install.ps1
          Copy-Item Start-MCP-Server.ps1 -Destination release/
          Copy-Item Start-MCP-Server.bat -Destination release/
          Copy-Item Create-Shortcut.ps1 -Destination release/
          Copy-Item Start-WSL-MCP-Server.ps1 -Destination release/
          Copy-Item Start-WSL-MCP-Server.bat -Destination release/
          Copy-Item Create-WSL-Shortcut.ps1 -Destination release/
          Copy-Item start.sh -Destination release/
          Compress-Archive -Path release/* -DestinationPath "${{ env.BINARY_NAME }}-${{ matrix.target }}.${{ matrix.archive }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.target }}
          path: ${{ env.BINARY_NAME }}-${{ matrix.target }}.${{ matrix.archive }}

  # =============================================================================
  # Stage 2: Build and push Docker image (depends on build-ui)
  # =============================================================================
  build-docker:
    name: Build and Push Docker Image
    needs: build-ui
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
            echo "version=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            TAG="${GITHUB_REF#refs/tags/}"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "version=$TAG" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./rust-mcp/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: true
          platforms: linux/amd64

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        continue-on-error: true
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          artifact-name: sbom-docker.spdx.json
          output-file: ./sbom-docker.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v6
        continue-on-error: true
        with:
          name: sbom-docker
          path: ./sbom-docker.spdx.json
          if-no-files-found: warn

  # =============================================================================
  # Stage 2: Build Debian package (depends on build-ui and build)
  # =============================================================================
  build-deb:
    name: Build Debian Package
    needs: [build-ui, build-docs, build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download UI build artifacts
        uses: actions/download-artifact@v7
        with:
          name: config-ui-dist
          path: rust-mcp/static/dist

      - name: Download documentation artifacts
        uses: actions/download-artifact@v7
        with:
          name: mdbook-docs
          path: docs/book

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --manifest-path rust-mcp/Cargo.toml

      - name: Build Debian package
        run: |
          cd rust-mcp
          cargo deb --target ${{ matrix.target }} --no-build

      - name: Upload deb artifact
        uses: actions/upload-artifact@v6
        with:
          name: odoo-rust-mcp-${{ matrix.arch }}.deb
          path: rust-mcp/target/${{ matrix.target }}/debian/*.deb

  # =============================================================================
  # Stage 2: Build Windows Desktop App (depends on build-ui and build-docs)
  # =============================================================================
  build-desktop:
    name: Build Windows Desktop App
    needs: [build-ui, build-docs]
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download UI build artifacts
        uses: actions/download-artifact@v7
        with:
          name: config-ui-dist
          path: rust-mcp/static/dist

      - name: Download documentation artifacts
        uses: actions/download-artifact@v7
        with:
          name: mdbook-docs
          path: docs/book

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build odoo-rust-mcp sidecar binary
        run: cargo build --release --target x86_64-pc-windows-msvc --manifest-path rust-mcp/Cargo.toml

      - name: Prepare Tauri sidecar and assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path desktop/src-tauri/binaries | Out-Null
          Copy-Item "rust-mcp/target/x86_64-pc-windows-msvc/release/odoo-rust-mcp.exe" -Destination "desktop/src-tauri/binaries/odoo-rust-mcp-desktop-server-x86_64-pc-windows-msvc.exe"
          New-Item -ItemType Directory -Force -Path desktop/src-tauri/static/dist | Out-Null
          Copy-Item -Recurse "rust-mcp/static/dist/*" -Destination "desktop/src-tauri/static/dist/"
          New-Item -ItemType Directory -Force -Path desktop/src-tauri/docs/book | Out-Null
          Copy-Item -Recurse "docs/book/*" -Destination "desktop/src-tauri/docs/book/"

      - name: Install Desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build Tauri Desktop App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          includeRelease: true
          includeUpdaterJson: false

      - name: Upload Desktop artifacts
        uses: actions/upload-artifact@v6
        with:
          name: odoo-rust-mcp-desktop-windows
          path: |
            desktop/src-tauri/target/release/bundle/nsis/*.exe*
            desktop/src-tauri/target/release/bundle/nsis/*.zip*
            desktop/src-tauri/target/release/bundle/msi/*.msi*
            desktop/src-tauri/target/release/bundle/msi/*.zip*

  # =============================================================================
  # Stage 2: Build Linux Desktop App (AppImage/deb) — depends on build-ui/build-docs
  # =============================================================================
  build-desktop-linux:
    name: Build Linux Desktop App
    needs: [build-ui, build-docs]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download UI build artifacts
        uses: actions/download-artifact@v7
        with:
          name: config-ui-dist
          path: rust-mcp/static/dist

      - name: Download documentation artifacts
        uses: actions/download-artifact@v7
        with:
          name: mdbook-docs
          path: docs/book

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build odoo-rust-mcp sidecar binary
        run: cargo build --release --target x86_64-unknown-linux-gnu --manifest-path rust-mcp/Cargo.toml --bin odoo-rust-mcp

      - name: Prepare Tauri sidecar and assets
        run: |
          mkdir -p desktop/src-tauri/binaries
          cp rust-mcp/target/x86_64-unknown-linux-gnu/release/odoo-rust-mcp \
            desktop/src-tauri/binaries/odoo-rust-mcp-desktop-server-x86_64-unknown-linux-gnu
          mkdir -p desktop/src-tauri/static/dist
          cp -r rust-mcp/static/dist/* desktop/src-tauri/static/dist/
          mkdir -p desktop/src-tauri/docs/book
          cp -r docs/book/* desktop/src-tauri/docs/book/

      - name: Install Desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build Tauri Desktop App
        working-directory: desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NO_STRIP: "true"
        run: npm run tauri build -- --bundles appimage,deb

      - name: List desktop bundles
        run: |
          echo "=== Linux desktop bundles ==="
          find desktop/src-tauri/target/release/bundle -type f \( -name '*.AppImage*' -o -name '*.deb' \) -print

      - name: Upload Desktop artifacts
        uses: actions/upload-artifact@v6
        with:
          name: odoo-rust-mcp-desktop-linux
          if-no-files-found: error
          path: |
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage*
            desktop/src-tauri/target/release/bundle/deb/*.deb

  # =============================================================================
  # Stage 3: Create GitHub Release (waits for all builds, runs if build succeeds)
  # =============================================================================
  release:
    name: Create GitHub Release
    needs: [build, build-docker, build-deb, build-desktop, build-desktop-linux]
    # Run even if optional builds fail, as long as the core binary + Windows desktop succeed
    if: always() && needs.build.result == 'success' && needs.build-desktop.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download binary artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: odoo-rust-mcp-*
          path: release-assets
          merge-multiple: true

      - name: List downloaded artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          find release-assets -type f 2>/dev/null || echo "No artifacts found"
          ls -laR release-assets 2>/dev/null || true

      - name: Flatten release assets
        run: |
          echo "=== Flattening release-assets ==="
          find release-assets -mindepth 2 -type f -exec mv -t release-assets/ {} + || true
          find release-assets -type d -empty -delete
          echo "=== Flattened release-assets ==="
          ls -la release-assets

      - name: Get tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Generate SHA256 checksums
        id: checksums
        run: |
          cd release-assets
          echo "=== Files in release-assets ==="
          ls -la
          echo "=== Generating checksums ==="
          shopt -s nullglob
          for file in *.tar.gz *.zip *.deb *.msi *.exe; do
            sha256=$(sha256sum "$file" | cut -d' ' -f1)
            echo "Checksum for $file: $sha256"
            if [[ "$file" == *"aarch64-apple-darwin"* ]]; then
              echo "sha256_macos_arm64=$sha256" >> $GITHUB_OUTPUT
            elif [[ "$file" == *"x86_64-apple-darwin"* ]]; then
              echo "sha256_macos_x64=$sha256" >> $GITHUB_OUTPUT
            elif [[ "$file" == *"x86_64-unknown-linux-gnu"* ]]; then
              echo "sha256_linux_x64=$sha256" >> $GITHUB_OUTPUT
            fi
          done
          shopt -u nullglob
          # Generate checksums file
          sha256sum *.tar.gz *.zip *.deb *.msi *.exe 2>/dev/null > SHA256SUMS.txt || echo "No files to checksum"
          cat SHA256SUMS.txt 2>/dev/null || echo "No checksums generated"

      - name: Generate Tauri Updater manifest (latest.json)
        shell: bash
        run: |
          cd release-assets
          echo "=== Generating Tauri updater manifest ==="
          
          # Find the updater zip file and signature (excluding standard zip release files)
          ZIP_FILE=$(find . -name "*.zip" ! -name "odoo-rust-mcp-*" | head -n 1)
          
          if [ -n "$ZIP_FILE" ]; then
            ZIP_NAME=$(basename "$ZIP_FILE")
            SIG_FILE="${ZIP_FILE}.sig"
            
            if [ -f "$SIG_FILE" ]; then
              SIGNATURE=$(cat "$SIG_FILE")
              VERSION="${{ steps.tag.outputs.tag }}"
              PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
              
              printf '{\n  "version": "%s",\n  "notes": "Release %s",\n  "pub_date": "%s",\n  "platforms": {\n    "windows-x86_64": {\n      "signature": "%s",\n      "url": "https://github.com/milzamsz/odoo-rust-mcp/releases/download/%s/%s"\n    }\n  }\n}\n' \
                "$VERSION" "$VERSION" "$PUB_DATE" "$SIGNATURE" "$VERSION" "$ZIP_NAME" > latest.json
              echo "✓ Generated latest.json successfully:"
              cat latest.json
            else
              echo "⚠ Signature file $SIG_FILE not found. Skipping latest.json generation."
            fi
          else
            echo "⚠ Updater zip file not found. Skipping latest.json generation."
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # =============================================================================
  # Stage 4: Update APT Repository (depends on release, build-deb)
  # =============================================================================
  update-apt-repo:
    name: Update APT Repository
    needs: [release, build-deb]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: ${{ vars.APT_REPO_ENABLED == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download deb artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: odoo-rust-mcp-*.deb
          path: debs
          merge-multiple: true

      - name: Get tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "version=${TAG#v}" >> $GITHUB_OUTPUT
          else
            TAG="${GITHUB_REF#refs/tags/}"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "version=${TAG#v}" >> $GITHUB_OUTPUT
          fi

      - name: Install reprepro
        run: sudo apt-get update && sudo apt-get install -y reprepro gnupg

      - name: Import GPG key
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
        run: |
          echo "$APT_GPG_PRIVATE_KEY" | base64 -d | gpg --batch --import
          gpg --armor --export > apt-repo/pubkey.gpg

      - name: Fetch existing APT repo from gh-pages
        run: |
          git fetch origin gh-pages || echo "No gh-pages branch yet"
          if git show origin/gh-pages:dists 2>/dev/null; then
            git checkout origin/gh-pages -- dists pool 2>/dev/null || true
            if [ -d "dists" ]; then
              cp -r dists apt-repo/ || true
              cp -r pool apt-repo/ || true
              rm -rf dists pool
            fi
          fi

      - name: Update APT repository
        env:
          APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
        run: |
          cd apt-repo
          for deb in ../debs/*.deb; do
            if [ -f "$deb" ]; then
              echo "Adding $deb to repository"
              reprepro --ask-passphrase includedeb stable "$deb" <<< "$APT_GPG_PASSPHRASE"
            fi
          done
          reprepro list stable

      - name: Deploy to GitHub Pages
        run: |
          cd apt-repo
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git init
          git checkout -b gh-pages
          git add -A
          git commit -m "Update APT repository for ${{ steps.tag.outputs.tag }}"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push -f origin gh-pages

  # =============================================================================
  # Stage 5: Installation Tests (depends on update-apt-repo)
  # =============================================================================

  test-apt:
    name: Test APT Package (Linux)
    needs: update-apt-repo
    runs-on: ubuntu-latest
    if: ${{ vars.APT_REPO_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v6

      - name: Add APT repository and install
        run: |
          curl -fsSL https://rachmataditiya.github.io/odoo-rust-mcp/pubkey.gpg | sudo gpg --dearmor -o /usr/share/keyrings/odoo-rust-mcp.gpg
          echo "deb [signed-by=/usr/share/keyrings/odoo-rust-mcp.gpg] https://rachmataditiya.github.io/odoo-rust-mcp stable main" | sudo tee /etc/apt/sources.list.d/odoo-rust-mcp.list
          sudo apt-get update
          sudo apt-get install -y odoo-rust-mcp

      - name: Verify installation
        run: |
          echo "=== Verifying binary installation ==="
          [ -f "/usr/bin/odoo-rust-mcp" ] && echo "PASS: odoo-rust-mcp installed"
          [ -f "/usr/bin/odoo-rust-mcp-service" ] && echo "PASS: odoo-rust-mcp-service installed"
          odoo-rust-mcp --help
          
          echo "=== Verifying share directory config files ==="
          SHARE_DIR="/usr/share/odoo-rust-mcp"
          for f in tools.json prompts.json server.json; do
            [ -f "$SHARE_DIR/$f" ] && echo "PASS: $f exists in $SHARE_DIR"
          done
          
          echo "=== Verifying systemd service file ==="
          [ -f "/lib/systemd/system/odoo-rust-mcp.service" ] && echo "PASS: systemd service file installed"
          
          echo "=== Verifying system config created by postinst ==="
          SYSTEM_CONFIG="/etc/odoo-rust-mcp"
          [ -d "$SYSTEM_CONFIG" ] && echo "PASS: /etc/odoo-rust-mcp directory exists"
          [ -f "$SYSTEM_CONFIG/instances.json" ] && echo "PASS: instances.json created"
          [ -f "$SYSTEM_CONFIG/env" ] && echo "PASS: env file created"
          [ -f "$SYSTEM_CONFIG/tools.json" ] && echo "PASS: tools.json copied"
          ls -la "$SYSTEM_CONFIG/" || true

      - name: Test systemd service
        run: |
          echo "=== Reloading systemd daemon ==="
          sudo systemctl daemon-reload
          
          echo "=== Enabling odoo-rust-mcp service ==="
          sudo systemctl enable odoo-rust-mcp
          echo "PASS: Service enabled"
          
          echo "=== Starting odoo-rust-mcp service ==="
          sudo systemctl start odoo-rust-mcp
          
          echo "=== Waiting for service to start ==="
          sleep 3
          
          echo "=== Checking service status ==="
          sudo systemctl status odoo-rust-mcp --no-pager || true
          
          if sudo systemctl is-active --quiet odoo-rust-mcp; then
            echo "PASS: odoo-rust-mcp service is running"
          else
            echo "FAIL: odoo-rust-mcp service is not running"
            echo "=== Service logs ==="
            sudo journalctl -u odoo-rust-mcp --no-pager -n 50
            exit 1
          fi
          
          echo "=== Testing HTTP endpoint ==="
          for i in $(seq 1 10); do
            if curl -s http://127.0.0.1:8787/health > /dev/null 2>&1; then
              echo "PASS: HTTP health endpoint responding"
              curl -s http://127.0.0.1:8787/health | head -c 500
              break
            fi
            echo "Waiting for HTTP endpoint... ($i/10)"
            sleep 1
          done
          
          echo ""
          echo "=== Testing MCP endpoint ==="
          MCP_RESPONSE=$(curl -s -X POST http://127.0.0.1:8787/mcp \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"test","version":"1.0"}}}' \
            2>/dev/null || echo "")
          
          if echo "$MCP_RESPONSE" | grep -q "serverInfo"; then
            echo "PASS: MCP initialize endpoint working"
            echo "$MCP_RESPONSE" | head -c 500
          else
            echo "WARN: MCP endpoint may not be fully ready (expected during fresh install)"
          fi
          
          echo ""
          echo "=== Stopping service ==="
          sudo systemctl stop odoo-rust-mcp
          
          if ! sudo systemctl is-active --quiet odoo-rust-mcp; then
            echo "PASS: Service stopped cleanly"
          else
            echo "FAIL: Service did not stop"
            exit 1
          fi

      - name: Cleanup
        run: |
          sudo systemctl stop odoo-rust-mcp 2>/dev/null || true
          sudo systemctl disable odoo-rust-mcp 2>/dev/null || true
          sudo apt-get remove -y odoo-rust-mcp || true

  test-install-script:
    name: Test Install Scripts
    needs: release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Get tag name
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Test install script (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p test-release && cd test-release
          curl -sL "https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/odoo-rust-mcp-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          
          # Verify instances.json is included in release
          [ -f "instances.json" ] && echo "PASS: instances.json included in release"
          [ -f "docs/book/index.html" ] || { echo "FAIL: mdBook documentation missing"; exit 1; }
          [ -f "assets/odoo-rust-mcp.ico" ] || { echo "FAIL: application icon missing"; exit 1; }
          echo "PASS: mdBook documentation and application icon included in release"
          
          cp ../scripts/install.sh . && chmod +x install.sh
          PREFIX="$HOME/.local" ./install.sh
          [ -f "$HOME/.local/bin/odoo-rust-mcp" ] && echo "PASS: Binary installed"
          [ -f "$HOME/.local/share/odoo-rust-mcp/docs/book/index.html" ] || { echo "FAIL: Documentation not installed"; exit 1; }
          [ -f "$HOME/.local/share/odoo-rust-mcp/instances.json" ] || echo "Note: instances.json will be created on first run"
          $HOME/.local/bin/odoo-rust-mcp --help
          PREFIX="$HOME/.local" ./install.sh uninstall
          [ ! -f "$HOME/.local/bin/odoo-rust-mcp" ] && echo "PASS: Binary removed"

      - name: Test install script (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path test-release
          $url = "https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/odoo-rust-mcp-x86_64-pc-windows-msvc.zip"
          Invoke-WebRequest -Uri $url -OutFile test-release/release.zip
          Expand-Archive -Path test-release/release.zip -DestinationPath test-release -Force
          
          # Verify binary
          if (Test-Path test-release/odoo-rust-mcp.exe) {
            Write-Host "PASS: Binary exists"
            & test-release/odoo-rust-mcp.exe --help
          }
          
          # Verify instances.json is included in release
          if (Test-Path test-release/instances.json) {
            Write-Host "PASS: instances.json included in release"
          }
          if (-not (Test-Path test-release/docs/book/index.html)) {
            throw "Built mdBook documentation is missing from the Windows release"
          }
          if (-not (Test-Path test-release/assets/odoo-rust-mcp.ico)) {
            throw "Application icon is missing from the Windows release"
          }
