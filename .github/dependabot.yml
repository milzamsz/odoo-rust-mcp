version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"

  # Rust MCP Server (Backend)
  - package-ecosystem: "cargo"
    directory: "/rust-mcp"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      cargo-deps:
        patterns:
          - "*"

  # React Config UI (Frontend)
  - package-ecosystem: "npm"
    directory: "/config-ui"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      npm-deps:
        patterns:
          - "*"

  # Tauri Desktop App (Frontend JS dependencies)
  - package-ecosystem: "npm"
    directory: "/desktop"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      npm-deps:
        patterns:
          - "*"

  # Tauri Desktop App (Rust dependencies)
  - package-ecosystem: "cargo"
    directory: "/desktop/src-tauri"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      cargo-deps:
        patterns:
          - "*"
