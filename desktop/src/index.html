<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Odoo Rust MCP</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f5f5f0;
        color: #1b1b1b;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .container { text-align: center; max-width: 480px; }
      h1 { font-size: 1.5rem; font-weight: 500; margin-bottom: 0.5rem; }
      p { color: #6b6b63; font-size: 0.9rem; line-height: 1.5; }
      .loader { border: 3px solid #e0e0d8; border-top: 3px solid #228be6; border-radius: 50%; width: 32px; height: 32px; animation: spin 0.8s linear infinite; margin: 2rem auto; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .error { color: #e03131; display: none; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="loader" id="loader"></div>
      <h1>Starting Odoo MCP Server...</h1>
      <p id="status">Waiting for the configuration server to become ready.</p>
      <p class="error" id="error-msg">Could not connect to the configuration server. Please check that rust-mcp.exe is running.</p>
    </div>
    <script>
      // When packaged, Tauri loads this HTML first.
      // After a short delay, redirect to the Config UI.
      // The sidecar should be launching the server in parallel.
      setTimeout(function() {
        window.location.replace('http://127.0.0.1:3008');
      }, 3000);
    </script>
  </body>
</html>
